<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Explorer 🌍</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <header>
    <h1>🌸 World Explorer</h1>
    <p>Discover beautiful countries and destinations!</p>
  </header>

  <main>
    <section id="popularCountriesSection">
      <h2>💖 Popular Countries</h2>
      <div id="popularCountries" class="grid"></div>
    </section>

    <section id="randomCountriesSection">
      <h2>🎲 Random Countries</h2>
      <div id="randomCountries" class="grid"></div>
    </section>

    <section id="popularLocationsSection">
      <h2>📍 Popular Locations</h2>
      <div id="popularLocations" class="grid"></div>
    </section>

    <section id="randomLocationsSection">
        <h2>🌈 Random Locations</h2>
        <div id="randomLocations" class="grid"></div>
    </section>
  </main>

  <div class="loader">Loading...</div>

  <script src="index.js"></script>
</body>
</html>
