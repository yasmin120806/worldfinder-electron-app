<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Monthly Planner</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #fdf6f9;
      color: #333;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #ffb6c1;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h1 {
      color: #fff;
      font-weight: 600;
      margin: 0;
    }

    #searchInput {
      margin: 20px auto;
      padding: 10px 15px;
      width: 50%;
      border: 2px solid #ffb6c1;
      border-radius: 25px;
      outline: none;
      font-size: 16px;
      transition: 0.3s;
    }

    #searchInput:focus {
      border-color: #ff69b4;
      box-shadow: 0 0 6px rgba(255,105,180,0.5);
    }

    .month-section {
      margin: 40px auto;
      max-width: 1100px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      padding: 20px;
      transition: 0.3s;
    }

    .month-section h2 {
        color:#ff4d6d;
        margin-bottom: 10px;
    }

    .month-section:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.15);
    }

    .month-title {
      font-size: 1.8em;
      color: #ff69b4;
      margin-bottom: 15px;
    }

    .month-countries {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        justify-content: flex-start;
    }

    .country-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-start;
      gap: 20px;
    }

    .country-card {
      background: #fff0f5;
      border: 1px solid #ffc0cb;
      border-radius: 15px;
      width: 200px;
      padding: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      transition: transform 0.2s ease;
    }

    .country-card:hover {
      transform: scale(1.05);
    }

    .country-card img {
      width: 100%;
      border-radius: 12px;
      height: 120px;
      object-fit: cover;
    }

    .country-card h3 {
      margin: 10px 0;
      color: #333;
      font-size: 1.1em;
    }

    button {
      display: block;
      width: 100%;
      background-color: #ff69b4;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px;
      margin-top: 5px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #ff85c1;
    }

    .back-button {
      background-color: #ffb3c6;
      border: none;
      color: #333;
      padding: 10px 20px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      margin: 20px;
      transition: background 0.3s;
    }

    .back-button:hover {
      background-color: #ff89a6;
    }

    .empty-month {
      color: #999;
      font-style: italic;
    }

    .country-note {
      display: none;
      width: 100%;
      margin-top: 8px;
      border: 2px solid #ffc0cb;
      border-radius: 8px;
      padding: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      resize: vertical;
      transition: 0.3s;
}

    .country-note:focus {
      border-color: #ff69b4;
      box-shadow: 0 0 6px rgba(255,105,180,0.4);
    }


    #backHome {
      background-color: #ff69b4;
      border: none;
      padding: 8px 12px;
      border-radius: 12px;
      cursor: pointer;
      color: white;
      transition: background 0.3s;
    }

    #backHome:hover {
      background-color: #ff6f91;
    }

  </style>
</head>
<body>

  <header>
    <h1>🌸 Travel Monthly Planner 🌸</h1>
    <div>
        <button id ="backHome">Home</button>
    </div>
  </header>

  <main>
    <div id="plannerContainer"></div>
  </main>

  <input type="text" id="searchInput" placeholder="Search your planner (countries or locations)...">

  <!-- 🗓️ Month Sections -->
  <div id="plannerContainer">
    <div id="January" class="month-section">
      <h2 class="month-title">January</h2>
      <div class="country-container"></div>
    </div>

    <div id="February" class="month-section">
      <h2 class="month-title">February</h2>
      <div class="country-container"></div>
    </div>

    <div id="March" class="month-section">
      <h2 class="month-title">March</h2>
      <div class="country-container"></div>
    </div>

    <div id="April" class="month-section">
      <h2 class="month-title">April</h2>
      <div class="country-container"></div>
    </div>

    <div id="May" class="month-section">
      <h2 class="month-title">May</h2>
      <div class="country-container"></div>
    </div>

    <div id="June" class="month-section">
      <h2 class="month-title">June</h2>
      <div class="country-container"></div>
    </div>

    <div id="July" class="month-section">
      <h2 class="month-title">July</h2>
      <div class="country-container"></div>
    </div>

    <div id="August" class="month-section">
      <h2 class="month-title">August</h2>
      <div class="country-container"></div>
    </div>

    <div id="September" class="month-section">
      <h2 class="month-title">September</h2>
      <div class="country-container"></div>
    </div>

    <div id="October" class="month-section">
      <h2 class="month-title">October</h2>
      <div class="country-container"></div>
    </div>

    <div id="November" class="month-section">
      <h2 class="month-title">November</h2>
      <div class="country-container"></div>
    </div>

    <div id="December" class="month-section">
      <h2 class="month-title">December</h2>
      <div class="country-container"></div>
    </div>
  </div>

  <script src="planner.js"></script>
</body>
</html>
